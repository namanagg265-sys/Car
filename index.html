     <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VELOCITY 3D — Open World Racing</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box; user-select: none; -webkit-tap-highlight-color: transparent;}
body{background:#000;overflow:hidden;font-family:'Rajdhani',sans-serif;color:#fff;width:100vw;height:100vh;}
#c{display:block;width:100vw;height:100vh;}

/* HUD */
#hud{position:absolute;inset:0;pointer-events:none;}

#speedo{position:absolute;bottom:24px;right:28px;width:150px;height:150px;}
#spd-num{position:absolute;bottom:44px;right:58px;font-family:'Orbitron',monospace;font-size:1.9rem;font-weight:900;color:#00f5ff;text-shadow:0 0 16px #00f5ff;}
#spd-unit{position:absolute;bottom:32px;right:64px;font-size:.6rem;color:rgba(0,245,255,.45);font-family:'Orbitron',monospace;letter-spacing:3px;}

#minimap{position:absolute;bottom:24px;left:24px;width:136px;height:136px;border-radius:50%;border:1.5px solid rgba(0,245,255,.25);background:rgba(0,5,20,.82);overflow:hidden;box-shadow:0 0 18px rgba(0,245,255,.12);}
#mmcv{display:block;}

#race-center{position:absolute;top:16px;left:50%;transform:translateX(-50%);text-align:center;font-family:'Orbitron',monospace;}
#lap-txt{font-size:.75rem;color:rgba(255,255,255,.4);letter-spacing:4px;}
#pos-txt{font-size:2.4rem;font-weight:900;color:#ffd600;text-shadow:0 0 18px #ffd600;line-height:1;}
#timer-txt{font-size:.8rem;color:rgba(255,255,255,.35);letter-spacing:3px;margin-top:2px;}

#gear-box{position:absolute;top:16px;right:22px;font-family:'Orbitron',monospace;text-align:right;}
#gear-lbl{font-size:.6rem;color:rgba(255,255,255,.3);letter-spacing:3px;}
#gear-num{font-size:2.8rem;font-weight:900;color:#ff2d55;text-shadow:0 0 18px #ff2d55;line-height:1;}

#lb{position:absolute;top:16px;left:16px;background:rgba(0,8,28,.82);border:1px solid rgba(0,245,255,.18);border-radius:6px;padding:10px 13px;font-family:'Orbitron',monospace;min-width:175px;backdrop-filter:blur(8px);}
#lb h3{font-size:.55rem;letter-spacing:4px;color:rgba(255,255,255,.3);margin-bottom:8px;}
.lbr{display:flex;align-items:center;gap:7px;font-size:.72rem;margin-bottom:4px;color:rgba(255,255,255,.65);}
.lbr.me{color:#ffd600;font-weight:700;}
.lbp{width:14px;color:rgba(255,255,255,.3);font-size:.6rem;}
.lbb{flex:1;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;}
.lbf{height:100%;background:#00f5ff;border-radius:2px;transition:width .5s;}
.lbr.me .lbf{background:#ffd600;}

#nos-wrap{position:absolute;bottom:180px;right:36px;display:flex;flex-direction:column;align-items:center;gap:4px;}
#nos-lbl{font-family:'Orbitron',monospace;font-size:.5rem;letter-spacing:3px;color:rgba(255,45,85,.5);}
#nos-bar{width:10px;height:76px;background:rgba(255,255,255,.06);border:1px solid rgba(255,45,85,.3);border-radius:5px;overflow:hidden;display:flex;align-items:flex-end;}
#nos-fill{width:100%;background:linear-gradient(0deg,#ff2d55,#ff9900);border-radius:4px;box-shadow:0 0 8px #ff2d55;transition:height .1s;}

#hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:10px;font-family:'Orbitron',monospace;font-size:.45rem;letter-spacing:1px;color:rgba(255,255,255,.1);}

/* MOBILE CONTROLS */
#mobile-controls {
    position: absolute;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
    pointer-events: none;
    z-index: 500;
}
.ctrl-group { display: flex; gap: 15px; pointer-events: auto; }
.m-btn {
    width: 65px;
    height: 65px;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(0,245,255,0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-family: 'Orbitron';
    color: #00f5ff;
    touch-action: none;
}
.m-btn:active { background: rgba(0,245,255,0.3); transform: scale(0.9); }
#btn-nos { border-color: #ff2d55; color: #ff2d55; width: 50px; height: 50px; position: absolute; bottom: 100px; right: 20px; pointer-events: auto;}

/* Screens */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(2,3,10,.94);z-index:1000;}
.screen h1{font-family:'Orbitron',monospace;font-size:3rem;font-weight:900;letter-spacing:8px;background:linear-gradient(90deg,#00f5ff,#ff2d55);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 28px rgba(0,245,255,.4));margin-bottom:6px;}
.screen .sub{font-size:0.8rem;letter-spacing:4px;color:rgba(255,255,255,.3);margin-bottom:48px; text-align: center;}
.btn{font-family:'Orbitron',monospace;font-size:.8rem;letter-spacing:4px;color:#03040a;background:linear-gradient(90deg,#00f5ff,#0080ff);border:none;padding:13px 38px;cursor:pointer;border-radius:3px;pointer-events:all;transition:transform .15s,box-shadow .15s;box-shadow:0 0 28px rgba(0,245,255,.4);margin:7px;text-transform:uppercase;}

#cdnum{font-family:'Orbitron',monospace;font-size:7rem;font-weight:900;color:#00f5ff;text-shadow:0 0 60px #00f5ff;animation:pulse .8s ease-in-out infinite alternate;}
@keyframes pulse{from{transform:scale(1);}to{transform:scale(1.1);}}
#fin-time{font-family:'Orbitron',monospace;font-size:1.9rem;color:#00f5ff;margin:18px 0 4px;text-shadow:0 0 18px #00f5ff;}
#fin-pos{font-family:'Orbitron',monospace;font-size:.9rem;color:rgba(255,255,255,.35);letter-spacing:5px;margin-bottom:38px;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:300;}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="mobile-controls">
  <div class="ctrl-group">
    <div class="m-btn" id="btn-left">←</div>
    <div class="m-btn" id="btn-right">→</div>
  </div>
  <div class="m-btn" id="btn-nos">NOS</div>
  <div class="ctrl-group">
    <div class="m-btn" id="btn-brake">S</div>
    <div class="m-btn" id="btn-gas">W</div>
  </div>
</div>

<div id="hud">
  <div id="minimap"><canvas id="mmcv" width="136" height="136"></canvas></div>
  <div id="race-center">
    <div id="lap-txt">LAP <span id="lapc">1</span>/<span id="lapt">3</span></div>
    <div id="pos-txt">P<span id="posn">1</span></div>
    <div id="timer-txt">00:00.00</div>
  </div>
  <div id="gear-box"><div id="gear-lbl">GEAR</div><div id="gear-num">1</div></div>
  <div id="speedo">
    <svg width="150" height="150" viewBox="0 0 150 150" style="filter:drop-shadow(0 0 8px #00f5ff)">
      <circle cx="75" cy="75" r="65" fill="none" stroke="rgba(0,245,255,.07)" stroke-width="11"/>
      <circle id="spd-ring" cx="75" cy="75" r="65" fill="none" stroke="url(#sg)" stroke-width="9"
        stroke-linecap="round" stroke-dasharray="408" stroke-dashoffset="408" transform="rotate(-220 75 75)"/>
      <defs><linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#00f5ff"/><stop offset="100%" stop-color="#ff2d55"/>
      </linearGradient></defs>
    </svg>
    <div id="spd-num">0</div><div id="spd-unit">KM/H</div>
  </div>
  <div id="nos-wrap"><div id="nos-bar"><div id="nos-fill" style="height:100%"></div></div><div id="nos-lbl">NOS</div></div>
  <div id="lb"><h3>STANDINGS</h3><div id="lbrows"></div></div>
  <div id="hint">
    PC: W/S/A/D + SHIFT
  </div>
</div>

<div class="screen" id="start-scr">
  <h1>VELOCITY</h1>
  <div class="sub">3D OPEN WORLD RACING</div>
  <button class="btn" onclick="startCD()">START RACE</button>
</div>
<div class="screen" id="cd-scr" style="display:none"><div id="cdnum">3</div></div>
<div class="screen" id="fin-scr" style="display:none">
  <h1>FINISH</h1>
  <div id="fin-time">00:00.00</div>
  <div id="fin-pos">POSITION 1</div>
  <button class="btn" onclick="restartGame()">RACE AGAIN</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// --- PHYSICS AND INPUT LOGIC ---
const keys = { w:false, a:false, s:false, d:false, shift:false, r:false };

// Mobile Touch Binding
function bindBtn(id, key) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
  el.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
}
bindBtn('btn-gas', 'w');
bindBtn('btn-brake', 's');
bindBtn('btn-left', 'a');
bindBtn('btn-right', 'd');
bindBtn('btn-nos', 'shift');

window.addEventListener('keydown',e=>{ 
  const k=e.key.toLowerCase(); 
  if(k==='w')keys.w=true; if(k==='a')keys.a=true; if(k==='s')keys.s=true; 
  if(k==='d')keys.d=true; if(k==='shift')keys.shift=true; if(k==='r')keys.r=true;
});
window.addEventListener('keyup',e=>{ 
  const k=e.key.toLowerCase(); 
  if(k==='w')keys.w=false; if(k==='a')keys.a=false; if(k==='s')keys.s=false; 
  if(k==='d')keys.d=false; if(k==='shift')keys.shift=false; if(k==='r')keys.r=false;
});

// ── SCENE SETUP ──────────────────────────────────────────────
const W=window.innerWidth,H=window.innerHeight;
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setSize(W,H); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.1;
window.addEventListener('resize',()=>{renderer.setSize(window.innerWidth,window.innerHeight);camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();});

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0a0e1a);
scene.fog=new THREE.Fog(0x0a0e1a,120,500);

const camera=new THREE.PerspectiveCamera(60,W/H,0.1,2000);
camera.position.set(0,8,18); camera.lookAt(0,0,0);

// ── LIGHTS ───────────────────────────────────────────────────
const ambient=new THREE.AmbientLight(0x223355,1.2); scene.add(ambient);
const sun=new THREE.DirectionalLight(0xfff5e0,2.2);
sun.position.set(80,100,60); sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024); scene.add(sun);
const fill=new THREE.DirectionalLight(0x4488ff,0.5); fill.position.set(-60,40,-40); scene.add(fill);
const hemi=new THREE.HemisphereLight(0x223366,0x112200,0.8); scene.add(hemi);

// ── TRACK ────────────────────────────────────────────────────
const RAW_PTS=[[0,0],[40,-20],[90,-30],[140,-15],[180,10],[200,50],[190,100],[160,140],[110,160],[60,170],[20,155],[-30,140],[-70,110],[-90,70],[-85,25],[-55,-5],[-20,-10]];
const splinePts = RAW_PTS.map(([x,z])=>new THREE.Vector3(x,0,z));
const trackCurve = new THREE.CatmullRomCurve3(splinePts,true);
const NSEGS=200;
const trackPoints=trackCurve.getPoints(NSEGS);
const ROAD_W=9;

function buildRoad(){
  const pts=trackCurve.getPoints(NSEGS);
  const verts=[],idxs=[],uvs=[];
  for(let i=0;i<=NSEGS;i++){
    const t=i/NSEGS;
    const p=pts[i%pts.length], n=pts[(i+1)%pts.length];
    const dir=new THREE.Vector3().subVectors(n,p).normalize();
    const right=new THREE.Vector3(-dir.z,0,dir.x);
    const L=new THREE.Vector3().copy(p).addScaledVector(right,-ROAD_W);
    const R=new THREE.Vector3().copy(p).addScaledVector(right,ROAD_W);
    verts.push(L.x,0.02,L.z, R.x,0.02,R.z);
    uvs.push(0,t, 1,t);
  }
  for(let i=0;i<NSEGS;i++){
    const a=i*2,b=a+1,c=a+2,d=a+3;
    idxs.push(a,b,d, a,d,c);
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(verts),3));
  geo.setAttribute('uv',new THREE.BufferAttribute(new Float32Array(uvs),2));
  geo.setIndex(idxs); geo.computeVertexNormals();
  const mesh=new THREE.Mesh(geo,new THREE.MeshLambertMaterial({color:0x1a1a1a}));
  mesh.receiveShadow=true; scene.add(mesh);
}
buildRoad();

// Ground & Env
const ground=new THREE.Mesh(new THREE.PlaneGeometry(800,800),new THREE.MeshLambertMaterial({color:0x0d1f0d}));
ground.rotation.x=-Math.PI/2; ground.position.y=-0.05; scene.add(ground);

function makeTree(x,z){
  const g=new THREE.Group();
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.3,2),new THREE.MeshLambertMaterial({color:0x3d2510}));
  trunk.position.y=1; g.add(trunk);
  const top=new THREE.Mesh(new THREE.ConeGeometry(1.5,4),new THREE.MeshLambertMaterial({color:0x1a3d1a}));
  top.position.y=3; g.add(top);
  g.position.set(x,0,z); scene.add(g);
}
for(let i=0;i<60;i++){
  const x=(Math.random()-0.5)*400, z=(Math.random()-0.5)*400;
  if(Math.hypot(x,z)>30) makeTree(x,z);
}

// ── CAR BUILDER ───────────────────────────────────────────────
function buildCar(bodyColor, accentColor){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.BoxGeometry(2.2,0.6,4.4),new THREE.MeshPhongMaterial({color:bodyColor}));
  body.position.y=0.5; body.castShadow=true; g.add(body);
  const cabin=new THREE.Mesh(new THREE.BoxGeometry(1.6,0.55,2.0),new THREE.MeshPhongMaterial({color:0x111111}));
  cabin.position.set(0,1.05,0.2); g.add(cabin);
  g.wheels=[];
  const wpos=[[-1.1,0.4,1.3],[1.1,0.4,1.3],[-1.1,0.4,-1.3],[1.1,0.4,-1.3]];
  wpos.forEach(p=>{
    const w=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,0.3),new THREE.MeshPhongMaterial({color:0x222222}));
    w.rotation.z=Math.PI/2; w.position.set(p[0],p[1],p[2]); g.add(w); g.wheels.push(w);
  });
  return g;
}

// ── PHYSICS ───────────────────────────────────────────────────
class CarPhysics{
  constructor(mesh,isPlayer,name,startT){
    this.mesh=mesh; this.isPlayer=isPlayer; this.name=name;
    this.t=startT; this.speed=0; this.maxSpeed=isPlayer?0.0018:0.0016;
    this.nitro=100; this.gear=1; this.lap=1; this.cpIdx=0;
    this.finished=false; this.steerAngle=0;
  }
  update(){
    if(this.finished) return;
    if(this.isPlayer){
      if(keys.w) this.speed=Math.min(this.speed+0.00001, this.maxSpeed);
      else this.speed*=0.98;
      if(keys.s) this.speed*=0.9;
      if(keys.a) this.steerAngle = Math.min(this.steerAngle+0.05, 0.4);
      else if(keys.d) this.steerAngle = Math.max(this.steerAngle-0.05, -0.4);
      else this.steerAngle*=0.8;
      if(keys.shift && this.nitro>0) { this.speed*=1.02; this.nitro-=0.5; }
    } else {
      this.speed = this.maxSpeed * 0.95;
      this.t += this.speed;
    }
    
    this.t += this.speed;
    if(this.t>=1){this.t=0; this.lap++;}
    
    const pos = trackCurve.getPointAt(this.t % 1);
    const look = trackCurve.getPointAt((this.t + 0.01) % 1);
    this.mesh.position.lerp(pos, 0.2);
    this.mesh.lookAt(look);
    if(this.isPlayer) this.mesh.rotateY(this.steerAngle);
  }
}

const playerCar = buildCar(0x00f5ff, 0xffffff); scene.add(playerCar);
const playerPhys = new CarPhysics(playerCar, true, "PLAYER", 0);
const botCar = buildCar(0xff2d55, 0xffffff); scene.add(botCar);
const botPhys = new CarPhysics(botCar, false, "BOT 1", 0.02);

// ── UI & GAME LOOP ─────────────────────────────────────────────
let state='menu', startTime=0;
function startCD(){
  document.getElementById('start-scr').style.display='none';
  document.getElementById('cd-scr').style.display='flex';
  let c=3;
  let itv=setInterval(()=>{
    c--; document.getElementById('cdnum').innerText=c;
    if(c<=0){ clearInterval(itv); document.getElementById('cd-scr').style.display='none'; state='racing'; startTime=Date.now();}
  },1000);
}

function updateHUD(){
  document.getElementById('spd-num').innerText = Math.floor(playerPhys.speed*80000);
  document.getElementById('nos-fill').style.height = playerPhys.nitro + "%";
  document.getElementById('lapc').innerText = playerPhys.lap;
  if(playerPhys.lap > 3) { state='finished'; document.getElementById('fin-scr').style.display='flex'; }
}

function animate(){
  requestAnimationFrame(animate);
  if(state==='racing'){
    playerPhys.update();
    botPhys.update();
    updateHUD();
    
    camera.position.lerp(new THREE.Vector3().copy(playerCar.position).add(new THREE.Vector3(0,5,12).applyQuaternion(playerCar.quaternion)), 0.1);
    camera.lookAt(playerCar.position);
  }
  renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>

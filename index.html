 <!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Velocity 3D FINAL CARS</title>
<style>
body { margin:0; overflow:hidden; font-family:Arial; }
#hud { position:absolute; top:10px; left:10px; color:white; background:rgba(0,0,0,0.6); padding:10px; border-radius:10px; }
</style>
</head>
<body><div id="hud">Speed: <span id="speed">0</span></div><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script>
let scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);

let camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,2000);
let renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

let light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

// road
let road=new THREE.Mesh(new THREE.PlaneGeometry(20,2000),new THREE.MeshStandardMaterial({color:0x111111}));
road.rotation.x=-Math.PI/2;
scene.add(road);

// realistic car function
function createCar(color){
 let car=new THREE.Group();

 let body=new THREE.Mesh(new THREE.BoxGeometry(2,0.7,4),new THREE.MeshStandardMaterial({color}));
 let top=new THREE.Mesh(new THREE.BoxGeometry(1.5,0.5,2),new THREE.MeshStandardMaterial({color:0x333333}));
 top.position.y=0.6;

 car.add(body,top);
 car.position.y=0.5;
 return car;
}

// player car
let car=createCar(0xff0000);
scene.add(car);

// emoji cars (different colors)
let colors=[0x00ff00,0x0000ff,0xffff00,0xff00ff,0x00ffff,0xffffff];
let bots=[];

colors.forEach((c,i)=>{
 let bot=createCar(c);
 bot.position.set((Math.random()*10-5),0.5,-(i+1)*60);
 bots.push(bot);
 scene.add(bot);
});

// controls
let keys={};
document.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

let speed=0;

function animate(){
 requestAnimationFrame(animate);

 if(keys['w']) speed+=0.02;
 if(keys['s']) speed-=0.02;

 speed*=0.98;
 car.position.z-=speed;

 if(keys['a']) car.position.x-=0.2;
 if(keys['d']) car.position.x+=0.2;

 bots.forEach(bot=>{
  bot.position.z+=0.5;
  if(bot.position.z>car.position.z+50){ bot.position.z=car.position.z-200; }
 });

 camera.position.lerp(new THREE.Vector3(car.position.x,5,car.position.z+10),0.1);
 camera.lookAt(car.position);

 document.getElementById('speed').innerText=Math.abs(speed*100).toFixed(0);

 renderer.render(scene,camera);
}

camera.position.set(0,5,10);
animate();

window.addEventListener('resize',()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
</script><!-- MOBILE CONTROLS --><div style="position:absolute;bottom:20px;width:100%;display:flex;justify-content:space-between;padding:0 20px;">
  <div>
    <button ontouchstart="keys['a']=true" ontouchend="keys['a']=false" style="padding:20px;font-size:20px;">⬅️</button>
    <button ontouchstart="keys['d']=true" ontouchend="keys['d']=false" style="padding:20px;font-size:20px;">➡️</button>
  </div>
  <div>
    <button ontouchstart="keys['w']=true" ontouchend="keys['w']=false" style="padding:20px;font-size:20px;">🚀</button>
    <button ontouchstart="keys['s']=true" ontouchend="keys['s']=false" style="padding:20px;font-size:20px;">🛑</button>
  </div>
</div></body>
 </html>

   <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VELOCITY 3D FINAL</title>
<style>
body { margin:0; overflow:hidden; background:#000; font-family:Arial; }

#hud {
 position:absolute; top:15px; left:15px;
 color:#00f0ff; background:rgba(0,0,0,0.6);
 padding:12px; border-radius:10px;
}

#nitroBox {
 position:absolute; bottom:20px; right:20px;
 width:150px; height:10px;
 background:#222; border-radius:5px;
}
#nitroBar {
 height:100%; width:100%;
 background:linear-gradient(90deg,#ff2d55,#ff7b00);
}

#minimap {
 position:absolute; bottom:20px; left:20px;
 width:150px; height:150px;
 background:rgba(0,0,0,0.7);
 border-radius:50%;
}

/* MOBILE CONTROLS */
#controls {
 position:absolute;
 bottom:20px;
 width:100%;
 display:flex;
 justify-content:space-between;
 padding:0 20px;
 pointer-events:none;
}
#controls button {
 pointer-events:auto;
 width:60px;
 height:60px;
 border-radius:50%;
 border:none;
 font-size:22px;
 background:rgba(0,255,255,0.2);
 color:#00f0ff;
}
.rightControls {
 display:flex;
 gap:10px;
}
</style>
</head>
<body>

<div id="hud">
Speed: <span id="speed">0</span><br>
Lap: <span id="lap">1/3</span>
</div>

<div id="nitroBox"><div id="nitroBar"></div></div>
<canvas id="minimap" width="150" height="150"></canvas>

<!-- MOBILE CONTROLS -->
<div id="controls">
  <div>
    <button id="left">◀</button>
    <button id="right">▶</button>
  </div>
  <div class="rightControls">
    <button id="acc">▲</button>
    <button id="brake">▼</button>
    <button id="nitro">N</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,2000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,0.6));
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

// ROAD
const road = new THREE.Mesh(
 new THREE.PlaneGeometry(40,2000),
 new THREE.MeshStandardMaterial({color:0x111111})
);
road.rotation.x = -Math.PI/2;
scene.add(road);

// GROUND
const ground = new THREE.Mesh(
 new THREE.PlaneGeometry(2000,2000),
 new THREE.MeshStandardMaterial({color:0x228B22})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// CAR
function createCar(color){
 let g = new THREE.Group();
 let body = new THREE.Mesh(new THREE.BoxGeometry(2,1,4),
  new THREE.MeshStandardMaterial({color}));
 body.position.y=0.5;
 g.add(body);
 return g;
}

// PLAYER
let player = createCar(0x00f0ff);
scene.add(player);

// BOTS
let bots=[];
for(let i=0;i<5;i++){
 let b=createCar(Math.random()*0xffffff);
 b.position.set(Math.random()*20-10,0,-Math.random()*500);
 bots.push({mesh:b,speed:0.5+Math.random()*0.3});
 scene.add(b);
}

// TREES
for(let i=0;i<50;i++){
 let trunk=new THREE.Mesh(
  new THREE.CylinderGeometry(0.3,0.3,3),
  new THREE.MeshStandardMaterial({color:0x8b4513})
 );
 let leaves=new THREE.Mesh(
  new THREE.SphereGeometry(1.5),
  new THREE.MeshStandardMaterial({color:0x228B22})
 );
 let x=(Math.random()>0.5?30:-30);
 let z=Math.random()*1800-900;
 trunk.position.set(x,1.5,z);
 leaves.position.set(x,4,z);
 scene.add(trunk,leaves);
}

// CONTROLS
let keys={};
document.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

// MOBILE BUTTONS
function bindBtn(id,key){
 let btn=document.getElementById(id);
 btn.addEventListener("touchstart",e=>{e.preventDefault();keys[key]=true;});
 btn.addEventListener("touchend",()=>keys[key]=false);
}
bindBtn("left","a");
bindBtn("right","d");
bindBtn("acc","w");
bindBtn("brake","s");
bindBtn("nitro","shift");

let speed=0,nitro=100,angle=0,lap=1,finished=false;

// MINIMAP
let mm=document.getElementById('minimap');
let ctx=mm.getContext('2d');

function animate(){
 requestAnimationFrame(animate);

 if(!finished){
  if(keys['w']) speed+=0.02;
  if(keys['s']) speed-=0.02;

  if(keys['shift'] && nitro>0){
    speed+=0.05;
    nitro-=1;
  } else if(nitro<100){
    nitro+=0.4;
  }

  speed*=0.98;

  if(keys['a']) angle+=0.04;
  if(keys['d']) angle-=0.04;

  player.rotation.y=angle;
  player.position.x+=Math.sin(angle)*speed;
  player.position.z+=Math.cos(angle)*speed;

  bots.forEach(b=>{
    b.mesh.position.z+=b.speed;
    if(b.mesh.position.z>1000) b.mesh.position.z=-1000;
  });

  if(player.position.z>900){
    if(lap<3){
      lap++;
      player.position.z=-900;
      document.getElementById('lap').innerText=lap+"/3";
    } else {
      finished=true;
      alert("🏁 YOU WIN!");
    }
  }
 }

 camera.position.set(
  player.position.x - Math.sin(angle)*10,
  6,
  player.position.z - Math.cos(angle)*10
 );
 camera.lookAt(player.position);

 document.getElementById('speed').innerText=Math.abs(speed*200).toFixed(0);
 document.getElementById('nitroBar').style.width=nitro+"%";

 ctx.clearRect(0,0,150,150);
 ctx.fillStyle="rgba(0,255,255,0.3)";
 ctx.beginPath(); ctx.arc(75,75,70,0,Math.PI*2); ctx.fill();

 ctx.fillStyle="cyan";
 ctx.beginPath();
 ctx.arc(75+player.position.x*0.1,75+player.position.z*0.05,4,0,Math.PI*2);
 ctx.fill();

 renderer.render(scene,camera);
}

animate();

window.addEventListener('resize',()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
